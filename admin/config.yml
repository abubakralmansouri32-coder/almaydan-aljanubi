backend:
  name: git-gateway
  branch: main
  identity_url: https://almaydan-aljanubi.netlify.app/.netlify/identity
  gateway_url: https://almaydan-aljanubi.netlify.app/.netlify/git/github

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
    - name: "news"
    label: "News"
    folder: "_posts/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
            - label: "Title"
        name: "title"
        widget: "string"
            - label: "Date"
        name: "date"
        widget: "datetime"
            - label: "Body"
        name: "body"
        widget: "markdown"
