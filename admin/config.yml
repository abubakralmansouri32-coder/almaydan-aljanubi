backend:
  name: github
  repo: abubakralmansouri32-coder/almaydan-aljanubi
  branch: main
  auth_type: implicit
  app_id: Ov23liL7Jtxa8pbPBFvM

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
    - name: "news"
    label: "الأخبار"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
            - {label: "العنوان", name: "title", widget: "string"}
            - {label: "التاريخ", name: "date", widget: "datetime"}
            - {label: "الصورة", name: "image", widget: "image", required: false}
            - {label: "المحتوى", name: "body", widget:             - {label: dget: "markdown"}
